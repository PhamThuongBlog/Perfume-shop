# ============================================================
# AURA SIGNATURE - Docker Compose
# Stack: Next.js 16 + MongoDB 8 (replica set)
# ============================================================

services:

  # ---- MongoDB (self-initiates replica set) ----
  mongodb:
    image: mongo:8.0
    container_name: aura-mongodb
    restart: unless-stopped
    command: >
      bash -c "
        mongod --replSet rs0 --bind_ip_all --port 27017 &
        sleep 5;
        mongosh --eval '
          rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"mongodb:27017\"}]});
          while(!db.isMaster().ismaster){sleep(1000);}
          print(\"Replica set READY\");
        ' --quiet 2>/dev/null;
        wait
      "
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - aura-network

  # ---- AURA Signature App ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aura-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=mongodb://mongodb:27017/perfume-shop?replicaSet=rs0
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-to-random-secret-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-jwt-secret}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIRST_RUN=${FIRST_RUN:-false}
    depends_on:
      - mongodb
    networks:
      - aura-network

volumes:
  mongodb_data:
    driver: local
    name: aura-mongodb-data

networks:
  aura-network:
    driver: bridge
    name: aura-network
